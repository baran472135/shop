<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h1 class="display-5 fw-semibold text-dark">Arasan Shop</h1>
    
    <div class="w-50">
      <input 
        type="text"
        class="form-control form-control-lg"
        placeholder="Ürün ara... (örnek: laptop, fare, kulaklık)"
        [value]="searchTerm"
        (input)="onSearch($event)">
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    @for (product of filteredProducts(); track product.id) {
      <div class="col">
        <div class="card h-100 product-card">
          <img [src]="product.image" class="card-img-top" [alt]="product.name">
          <div class="card-body d-flex flex-column p-4">
            <h5 class="card-title fw-semibold">{{ product.name }}</h5>
            <p class="card-text price fw-bold fs-4 mt-2">{{ product.price }} TL</p>
            <button class="btn btn-primary mt-auto py-2">Detaylar</button>
          </div>
        </div>
      </div>
    }
  </div>

  @if (filteredProducts().length === 0) {
    <div class="text-center mt-5 py-5">
      <h4 class="text-muted">Aradığın ürün bulunamadı</h4>
      <p class="text-secondary">Lütfen farklı bir kelime deneyin.</p>
    </div>
  }
</div>

<footer class="mt-5 py-5 border-top">
  <div class="container text-center text-muted">
    <p class="mb-0">© Arasan Shop - Tüm Hakları Saklıdır.</p>
  </div>
</footer>
